services:
  mongodb:
    image: mongo:7.0
    container_name: supermarket_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--username", "root", "--password", "rootpassword", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: supermarket_backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/supermarket_accounting_system?authSource=admin
    ports:
      - "3000:3000"
    command: node server.js

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: supermarket_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: